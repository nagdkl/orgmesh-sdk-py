name: Read-only validation

on:
  pull_request:
    paths:
      - ".synergy/strategy/**"
      - ".github/workflows/read-only-validation.yml"
  push:
    branches: [main]
    paths:
      - ".synergy/strategy/**"
      - ".github/workflows/read-only-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-wave-32-strategy:
    name: Validate wave 32 strategy JSON
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate wave 32 strategy file
        run: python3 -m json.tool .synergy/strategy/wave-32-read-only-ci-validation.v1.json >/dev/null
